<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Filtrelenebilir Yapilacaklar Listesi">
    <title>To-Do List App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Yapilacaklar</h2>
        
        <div class="input-group">
            <input type="text" id="gorevInput" placeholder="Yeni görev ekle...">
            <button id="ekle">EKLE</button>
        </div>

        <select id="filtre">
            <option value="tum">Tümü</option>
            <option value="tamamlandı">Tamamlananlar</option>
            <option value="tamamlanmadı">Tamamlanmayanlar</option>
        </select>

        <ul id="gorev">
            </ul>
    </div>
    <link rel="stylesheet" href="style.css">

    <script src="script.js"></script>
</body>
</html>
